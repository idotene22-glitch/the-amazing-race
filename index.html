<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>המירוץ למיליון - האתר הרשמי</title>

  <style>
    body { margin:0; font-family:Arial; background:linear-gradient(135deg,#ffcc00,#ff3333);} 
    header {background:#d40000;color:#fff;text-align:center;padding:15px;font-size:22px;font-weight:bold;}
    .container {max-width:900px;margin:auto;padding:15px;}
    .card {background:#fff;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.2);} 
    h2 {color:#d40000;}

    textarea {resize:none;height:80px;}
    textarea,input {width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ccc;}

    button {margin-top:10px;padding:10px;width:100%;border:none;border-radius:10px;background:#ff3333;color:#fff;cursor:pointer;}
    button:hover {background:#cc0000;}

    .item {background:#f5f5f5;padding:10px;border-radius:10px;margin-top:10px;}
  </style>
</head>
<body>

<header>
המירוץ למיליון-האתר הרשמי של הערוץ: "המירוץ למיליון | כל העדכונים"
</header>

<div class="container">

<div class="card">
<h2>❓ שאלו שאלה</h2>
<input id="name" placeholder="שם">
<textarea id="question" placeholder="השאלה שלך"></textarea>
<button onclick="sendQuestion()">שלח</button>
<div id="questionsList"></div>
</div>

<div class="card">
<h2>💡 רעיונות</h2>
<input id="ideaName" placeholder="שם">
<textarea id="idea" placeholder="הרעיון שלך"></textarea>
<button onclick="sendIdea()">שלח</button>
<div id="ideasList"></div>
</div>

<div class="card">
<h2>🎮 משימה אקראית</h2>
<button onclick="randomTask()">תן משימה</button>
<p id="task"></p>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCeyv-YxIH7Si0s-q-EqEpH1doTktb3Z0o",
  authDomain: "amizng-race.firebaseapp.com",
  databaseURL: "https://amizng-race-default-rtdb.firebaseio.com",
  projectId: "amizng-race",
  storageBucket: "amizng-race.firebasestorage.app",
  messagingSenderId: "1073434857739",
  appId: "1:1073434857739:web:3fe8d2802bb5114c33520e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function sendQuestion(){
  const name=document.getElementById("name").value;
  const question=document.getElementById("question").value;
  if(!name||!question)return alert("מלא הכל");

  db.ref("questions").push({name,question,time:Date.now()});
}

function sendIdea(){
  const name=document.getElementById("ideaName").value;
  const idea=document.getElementById("idea").value;
  if(!name||!idea)return alert("מלא הכל");

  db.ref("ideas").push({name,idea,time:Date.now()});
}

function loadData(){
  db.ref("questions").on("value",snap=>{
    const list=document.getElementById("questionsList");
    list.innerHTML="";
    snap.forEach(item=>{
      const d=item.val();
      const div=document.createElement("div");
      div.className="item";
      div.innerHTML=`<b>${d.name}</b><br>${d.question}
      <input placeholder="תגובה" id="r${item.key}">
      <button onclick="reply('questions','${item.key}')">ענה</button>
      ${d.reply?"<br><b>תגובה:</b> "+d.reply:""}`;
      list.appendChild(div);
    });
  });

  db.ref("ideas").on("value",snap=>{
    const list=document.getElementById("ideasList");
    list.innerHTML="";
    snap.forEach(item=>{
      const d=item.val();
      const div=document.createElement("div");
      div.className="item";
      div.innerHTML=`<b>${d.name}</b><br>${d.idea}
      <input placeholder="תגובה" id="i${item.key}">
      <button onclick="reply('ideas','${item.key}')">ענה</button>
      ${d.reply?"<br><b>תגובה:</b> "+d.reply:""}`;
      list.appendChild(div);
    });
  });
}

function reply(type,key){
  const input=document.getElementById((type=="questions"?"r":"i")+key);
  const text=input.value;
  if(!text)return;

  db.ref(type+"/"+key).update({reply:text});
}

loadData();

function randomTask(){
  const tasks=[
    "מצא משהו אדום",
    "קפוץ 10 פעמים",
    "מצא חפץ עגול",
    "רוץ לחדר וחזור",
    "צלם משהו מצחיק",
    "מצא משהו צהוב",
    "המצא משחק חדש",
    "רקוד 10 שניות",
    "מצא ספר",
    "מצא משהו קטן",
    "מצא משהו גדול",
    "מצא משהו רך",
    "מצא משהו קשה",
    "מצא משהו מהיר",
    "מצא משהו איטי"
  ];

  const random=tasks[Math.floor(Math.random()*tasks.length)];
  document.getElementById("task").innerText=random;
}
</script>

</body>
</html>
