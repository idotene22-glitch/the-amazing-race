<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="vןןiewport" content="width=device-width, initial-scale=1.0">
<title>המירוץ למיליון - האתר הרשמי</title>

<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ffcc00,#ff3333);} 
header{background:#d40000;color:#fff;text-align:center;padding:15px;font-size:20px;font-weight:bold;}
.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#fff;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.2);} 
textarea{resize:none;height:80px;}
textarea,input{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:1px solid #ccc;}
button{margin-top:10px;padding:10px;width:100%;border:none;border-radius:10px;background:#ff3333;color:#fff;cursor:pointer;}
.item{background:#f5f5f5;padding:10px;border-radius:10px;margin-top:10px;}
.hidden{display:none;}
.notice{background:#d4edda;padding:10px;border-radius:10px;margin-bottom:10px;}
</style>
</head>
<body>

<header>
המירוץ למיליון-האתר הרשמי של הערוץ: "המירוץ למיליון | כל העדכונים"
</header>

<div class="container">

<div class="card">
<h2>❓ שלח שאלה</h2>
<input id="name" placeholder="שם">
<textarea id="question" placeholder="השאלה שלך"></textarea>
<button onclick="sendQuestion()">שלח</button>
</div>

<div class="card">
<h2>💡 שלח רעיון</h2>
<input id="ideaName" placeholder="שם">
<textarea id="idea" placeholder="הרעיון שלך"></textarea>
<button onclick="sendIdea()">שלח</button>
</div>

<div class="card">
<button onclick="toggleView()">📋 הצג שאלות ורעיונות</button>
<div id="viewArea" class="hidden"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyCeyv-YxIH7Si0s-q-EqEpH1doTktb3Z0o",
authDomain:"amizng-race.firebaseapp.com",
databaseURL:"https://amizng-race-default-rtdb.firebaseio.com",
projectId:"amizng-race",
storageBucket:"amizng-race.firebasestorage.app",
messagingSenderId:"1073434857739",
appId:"1:1073434857739:web:3fe8d2802bb5114c33520e"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// זיהוי משתמש אוטומטי (ללא בקשת אימייל)
// ⚠️ אין דרך אמיתית לזהות אימייל משתמש בלי התחברות
// לכן משתמשים בקוד סודי פנימי (רק אתה יודע)
const ADMIN_KEY = "I123U321i"; // תשנה לקוד שרק אתה יודע

let isAdmin = false;

// בדיקה אם יש קוד מנהל בדפדפן
const savedKey = localStorage.getItem("adminKey");
if(savedKey === ADMIN_KEY){
  isAdmin = true;
}

// דרך נסתרת להפעיל מצב מנהל
// לחץ Ctrl+Shift+A ואז הכנס קוד
window.addEventListener("keydown", function(e){
  if(e.ctrlKey && e.shiftKey && e.key === "A"){
    const code = prompt("הכנס קוד מנהל:");
    if(code === ADMIN_KEY){
      localStorage.setItem("adminKey", code);
      alert("מצב מנהל הופעל");
      location.reload();
    } else {
      alert("קוד שגוי");
    }
  }
});

function sendQuestion(){
const name=document.getElementById("name").value;
const question=document.getElementById("question").value;
if(!name||!question)return alert("מלא הכל");

const id=Date.now();
localStorage.setItem("userId",id);

db.ref("questions").push({name,question,time:id});
}

function sendIdea(){
const name=document.getElementById("ideaName").value;
const idea=document.getElementById("idea").value;
if(!name||!idea)return alert("מלא הכל");

db.ref("ideas").push({name,idea,time:Date.now()});
}

function toggleView(){
const el=document.getElementById("viewArea");
el.classList.toggle("hidden");
if(!el.classList.contains("hidden")) loadData();
}

function loadData(){
const area=document.getElementById("viewArea");
area.innerHTML="";

// שאלות
 db.ref("questions").on("value",snap=>{
   area.innerHTML="<h3>שאלות</h3>";
   snap.forEach(item=>{
     const d=item.val();
     const div=document.createElement("div");
     div.className="item";

     let replies="";
     if(d.replies){
       Object.values(d.replies).forEach(r=>{
         replies+=`<div>תגובה: ${r.text}</div>`;
       });
     }

     let replyBox="";
     if(isAdmin){
       replyBox=`
       <input id="r${item.key}" placeholder="תגובה">
       <button onclick="addReply('${item.key}')">ענה</button>`;
     }

     div.innerHTML=`<b>${d.name}</b><br>${d.question}${replies}${replyBox}`;
     area.appendChild(div);
   });
 });

 // רעיונות
 db.ref("ideas").on("value",snap=>{
   area.innerHTML+="<h3>רעיונות</h3>";
   snap.forEach(item=>{
     const d=item.val();
     const div=document.createElement("div");
     div.className="item";

     let replies="";
     if(d.replies){
       Object.values(d.replies).forEach(r=>{
         replies+=`<div>תגובה: ${r.text}</div>`;
       });
     }

     let replyBox="";
     if(isAdmin){
       replyBox=`
       <input id="i${item.key}" placeholder="תגובה">
       <button onclick="addReplyIdea('${item.key}')">ענה</button>`;
     }

     div.innerHTML=`<b>${d.name}</b><br>${d.idea}${replies}${replyBox}`;
     area.appendChild(div);
   });
 });
}

function addReply(key){
const text=document.getElementById("r"+key).value;
if(!text)return;

db.ref("questions/"+key+"/replies").push({text});
}

function addReplyIdea(key){
const text=document.getElementById("i"+key).value;
if(!text)return;

db.ref("ideas/"+key+"/replies").push({text});
}

// התראות בזמן אמת
const userId=localStorage.getItem("userId");
if(userId){
 db.ref("questions").on("child_changed",snap=>{
   const d=snap.val();
   if(d.time==userId && d.replies){
     alert("🔔 קיבלת תשובה חדשה!");
   }
 });
}

</script>

</body>
</html>
